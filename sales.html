<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NextWave Traffic Engine</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
      color: #ccc;
    }

    input {
      padding: 12px;
      width: 70%;
      margin-top: 20px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
    }

    .cta {
      background: #00ff88;
      color: black;
      padding: 15px 25px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      margin-top: 15px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>Turn Traffic Into Sales With A Real System</h1>

  <p>
    Enter your email to access the system that builds funnels,
    generates traffic, and converts leads into commissions.
  </p>

  <input id="emailInput" placeholder="Enter your email" />
  <br>
  <button class="cta" onclick="submitEmail()">Get Instant Access</button>

  <p id="status"></p>

</div>

<script>
function submitEmail() {
  const email = document.getElementById("emailInput").value;
  const status = document.getElementById("status");

  if (!email) {
    status.innerText = "Please enter an email.";
    return;
  }

  status.innerText = "Submitting...";

  fetch("/.netlify/functions/email", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email: email })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      status.innerText = "Success! Redirecting...";
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    } else {
      status.innerText = "Error: " + JSON.stringify(data);
    }
  })
  .catch(() => {
    status.innerText = "Error sending email.";
  });
}
</script>

</body>
</html>
