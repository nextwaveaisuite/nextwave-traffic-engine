<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextWave Engine</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:#e6e6e6;
}

.topbar {
  padding:16px 24px;
  background:#111827;
  border-bottom:1px solid #1f2937;
  font-weight:bold;
}

.wrap {
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
}

.card {
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:18px;
}

h2 {
  font-size:16px;
  margin-bottom:12px;
  color:#9ca3af;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #374151;
  background:#0b0f14;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover { opacity:0.9; }

.output {
  margin-top:10px;
  padding:10px;
  background:#0b0f14;
  border:1px solid #1f2937;
  border-radius:8px;
  font-size:13px;
  white-space:pre-wrap;
}

.tag {
  display:inline-block;
  padding:4px 8px;
  background:#1f2937;
  border-radius:6px;
  font-size:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topbar">NextWave Traffic Engine</div>

<div class="wrap">

<div class="grid">

<!-- FUNNEL -->
<div class="card">
<h2>Funnel Builder</h2>

<input id="funnelName" placeholder="Funnel Name">
<input id="affiliateLink" placeholder="Affiliate Link">

<button onclick="createFunnel()">Generate Funnel</button>

<div id="funnelOut" class="output"></div>
</div>

<!-- AI -->
<div class="card">
<h2>AI Funnel Engine</h2>

<button onclick="generateAI()">Generate Funnel Copy</button>

<div id="aiOut" class="output"></div>
</div>

<!-- TRAFFIC -->
<div class="card" style="grid-column: span 2;">
<h2>Traffic System</h2>

<button onclick="generateTraffic()">Generate Traffic Strategy</button>

<div id="trafficOut" class="output"></div>
</div>

</div>
</div>

<script>

async function createFunnel(){
  const res = await fetch("/.netlify/functions/createPage", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("funnelName").value,
      link: document.getElementById("affiliateLink").value
    })
  });

  const data = await res.json();

  document.getElementById("funnelOut").innerHTML =
  `<div class="tag">Generated Funnel</div>\n` +
  JSON.stringify(data, null, 2);
}

async function generateAI(){
  const res = await fetch("/.netlify/functions/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ niche:"affiliate marketing" })
  });

  const data = await res.json();

  document.getElementById("aiOut").innerHTML = `
Title: ${data.headline || "N/A"}

Hook: ${data.hook || "N/A"}

CTA: ${data.cta || "N/A"}
`;
}

async function generateTraffic(){
  const res = await fetch("/.netlify/functions/traffic");
  const data = await res.json();

  document.getElementById("trafficOut").innerHTML =
  data.map(x => "• " + x).join("\n");
}

</script>

</body>
</html>
