<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextWave Revenue OS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050914;
  color: #e5e7eb;
}

.header {
  padding: 20px;
  background: #0b1220;
  border-bottom: 1px solid #1f2937;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 25px;
  max-width: 1100px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: #0b1220;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #1f2937;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #1f2937;
  background: #050914;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.kpi {
  background: #0b1220;
  border: 1px solid #1f2937;
  padding: 12px;
  border-radius: 10px;
}

.kpi h3 {
  margin: 0;
  font-size: 12px;
  color: #9ca3af;
}

.kpi h2 {
  margin: 5px 0 0 0;
}

pre {
  background: #050914;
  padding: 10px;
  border-radius: 8px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="header">
  <div><b>NextWave Revenue OS</b></div>
  <div>LIVE SYSTEM</div>
</div>

<div class="container">

<!-- KPIs -->
<div class="kpis">
  <div class="kpi">
    <h3>Funnels</h3>
    <h2 id="funnels">0</h2>
  </div>
  <div class="kpi">
    <h3>Leads</h3>
    <h2 id="leads">0</h2>
  </div>
  <div class="kpi">
    <h3>Traffic</h3>
    <h2 id="traffic">0</h2>
  </div>
  <div class="kpi">
    <h3>Revenue</h3>
    <h2 id="revenue">$0</h2>
  </div>
</div>

<div class="grid">

<!-- FUNNEL BUILDER -->
<div class="card">
  <h3>Create Funnel</h3>

  <input id="funnelName" placeholder="Funnel Name">
  <input id="affiliateLink" placeholder="Affiliate Link">

  <button onclick="createFunnel()">Create Funnel</button>

  <pre id="funnelOut"></pre>
</div>

<!-- AI ENGINE -->
<div class="card">
  <h3>AI Funnel Generator</h3>

  <button onclick="generateAI()">Generate Funnel Copy</button>

  <pre id="aiOut"></pre>
</div>

</div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

/* =========================
   LOAD REAL METRICS
========================= */
async function loadMetrics() {

  const { data: funnels } = await supabase.from("funnels").select("*");
  const { data: leads } = await supabase.from("leads").select("*");
  const { data: events } = await supabase.from("events").select("*");

  const traffic = (events || []).filter(e => e.type === "traffic");
  const conversions = (events || []).filter(e => e.type === "conversion");

  document.getElementById("funnels").innerText = funnels?.length || 0;
  document.getElementById("leads").innerText = leads?.length || 0;
  document.getElementById("traffic").innerText = traffic.length;
  document.getElementById("revenue").innerText = "$" + (conversions.length * 10);
}

/* =========================
   CREATE FUNNEL
========================= */
window.createFunnel = async function () {

  const name = document.getElementById("funnelName").value;
  const link = document.getElementById("affiliateLink").value;

  const { data, error } = await supabase
    .from("funnels")
    .insert([{ name, affiliate_link: link }])
    .select();

  await supabase.from("events").insert([
    { type: "traffic", value: 1 }
  ]);

  document.getElementById("funnelOut").innerText =
    JSON.stringify(data, null, 2);

  loadMetrics();
};

/* =========================
   AI (simple placeholder)
========================= */
window.generateAI = function () {

  const copy = {
    headline: "Discover how to turn traffic into commissions",
    hook: "Most affiliates fail because they lack a system.",
    cta: "Click to activate your funnel system"
  };

  document.getElementById("aiOut").innerText =
    JSON.stringify(copy, null, 2);
};

/* INIT */
loadMetrics();

</script>

</body>
</html>
