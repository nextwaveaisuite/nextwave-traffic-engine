<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextWave Money Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#070b14;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar {
  padding:18px 24px;
  background:#0b1220;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
}

.brand {
  font-weight:700;
}

.pill {
  background:#1f2937;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  color:#9ca3af;
}

/* LAYOUT */
.container {
  max-width:1200px;
  margin:auto;
  padding:30px;
}

/* KPI ROW */
.kpis {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}

.kpi {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:14px;
}

.kpi h4 {
  margin:0;
  font-size:12px;
  color:#9ca3af;
}

.kpi h2 {
  margin:6px 0 0 0;
  font-size:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap:16px;
}

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:18px;
}

h3 {
  margin:0 0 10px 0;
  font-size:14px;
  color:#9ca3af;
}

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #1f2937;
  background:#070b14;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* OUTPUT */
.output {
  margin-top:12px;
  padding:12px;
  background:#070b14;
  border:1px solid #1f2937;
  border-radius:10px;
  font-size:13px;
  white-space:pre-wrap;
  color:#cbd5e1;
}

/* FUNNEL LIST */
.list {
  font-size:13px;
  color:#cbd5e1;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">NextWave Money System</div>
  <div class="pill">LIVE ENGINE</div>
</div>

<div class="container">

<!-- KPI DASHBOARD -->
<div class="kpis">
  <div class="kpi">
    <h4>Total Funnels</h4>
    <h2 id="kpiFunnels">0</h2>
  </div>

  <div class="kpi">
    <h4>Leads Captured</h4>
    <h2 id="kpiLeads">--</h2>
  </div>

  <div class="kpi">
    <h4>Traffic Outputs</h4>
    <h2 id="kpiTraffic">--</h2>
  </div>

  <div class="kpi">
    <h4>Status</h4>
    <h2 style="color:#22c55e;">Active</h2>
  </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

<!-- FUNNEL BUILDER -->
<div class="card">
<h3>Build Revenue Funnel</h3>

<input id="funnelName" placeholder="Funnel Name">
<input id="affiliateLink" placeholder="Affiliate Offer Link">

<button onclick="createFunnel()">Create Money Funnel</button>

<div id="funnelOut" class="output"></div>
</div>

<!-- AI ENGINE -->
<div class="card">
<h3>AI Conversion Engine</h3>

<button onclick="generateAI()">Generate High-Converting Copy</button>

<div id="aiOut" class="output"></div>
</div>

<!-- TRAFFIC -->
<div class="card" style="grid-column: span 2;">
<h3>Traffic Engine (Lead Generation System)</h3>

<button onclick="generateTraffic()">Generate Traffic Plan</button>

<div id="trafficOut" class="output"></div>
</div>

</div>
</div>

<script>

let funnelCount = 0;

/* FUNNEL */
async function createFunnel(){
  const res = await fetch("/.netlify/functions/createPage", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("funnelName").value,
      link: document.getElementById("affiliateLink").value
    })
  });

  const data = await res.json();

  funnelCount++;
  document.getElementById("kpiFunnels").innerText = funnelCount;

  document.getElementById("funnelOut").innerHTML =
  "✓ Funnel Created\n\nURL:\n" + (data.url || "generated");
}

/* AI */
async function generateAI(){
  const res = await fetch("/.netlify/functions/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ niche:"affiliate marketing" })
  });

  const data = await res.json();

  document.getElementById("aiOut").innerHTML = `
HEADLINE:
${data.headline || "-"}

HOOK:
${data.hook || "-"}

CTA:
${data.cta || "-"}
`;
}

/* TRAFFIC */
async function generateTraffic(){
  const res = await fetch("/.netlify/functions/traffic");
  const data = await res.json();

  document.getElementById("kpiTraffic").innerText = data.length;

  document.getElementById("trafficOut").innerHTML =
  "LEAD GENERATION PLAN:\n\n" + data.map(x => "• " + x).join("\n");
}

</script>

</body>
</html>
