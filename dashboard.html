<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revenue OS</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.header {
  padding:15px;
  background:#111827;
  display:flex;
  justify-content:space-between;
}

.container {
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#22c55e;
  border:none;
  color:black;
  font-weight:bold;
}

.kpis {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.kpi {
  background:#111827;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <div><b>Revenue OS</b></div>
  <div>LIVE</div>
</div>

<div class="container">

<div class="kpis">
  <div class="kpi">Funnels: <span id="funnels">0</span></div>
  <div class="kpi">Leads: <span id="leads">0</span></div>
  <div class="kpi">Clicks: <span id="clicks">0</span></div>
  <div class="kpi">Score: <span id="score">0</span></div>
</div>

<div class="grid">

<div class="card">
<h3>Create Funnel</h3>
<input id="name" placeholder="Funnel name">
<input id="link" placeholder="Affiliate link">
<button onclick="createFunnel()">Create</button>
<pre id="out"></pre>
</div>

<div class="card">
<h3>AI Copy</h3>
<button onclick="ai()">Generate</button>
<pre id="aiout"></pre>
</div>

</div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

/* LOAD DASHBOARD */
async function load() {

  const { data: funnels } = await supabase.from("funnels").select("*");
  const { data: leads } = await supabase.from("leads").select("*");
  const { data: events } = await supabase.from("events").select("*");

  document.getElementById("funnels").innerText = funnels?.length || 0;
  document.getElementById("leads").innerText = leads?.length || 0;

  const clicks = (events || []).filter(e => e.type === "click");
  document.getElementById("clicks").innerText = clicks.length;

  const score = (leads?.length || 0) * 2 + clicks.length;
  document.getElementById("score").innerText = score;
}

/* CREATE FUNNEL */
window.createFunnel = async function () {

  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  await supabase.from("funnels").insert([
    { name, affiliate_link: link }
  ]);

  await supabase.from("events").insert([
    { type: "click", funnel_name: name }
  ]);

  document.getElementById("out").innerText = "Funnel Created";

  load();
};

/* AI PLACEHOLDER */
window.ai = function () {
  document.getElementById("aiout").innerText =
  "Headline: Turn Traffic Into Sales\nHook: Simple system converts visitors into buyers\nCTA: Get started now";
};

load();

/* REFRESH LOOP */
setInterval(load, 10000);

</script>

</body>
</html>
