<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextWave Revenue OS</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#050914;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar {
  padding:18px 24px;
  background:#0b1220;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
}

.brand {
  font-weight:700;
}

.status {
  font-size:12px;
  padding:6px 10px;
  background:#1f2937;
  border-radius:999px;
  color:#9ca3af;
}

/* LAYOUT */
.container {
  max-width:1200px;
  margin:auto;
  padding:30px;
}

/* KPI GRID */
.kpis {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}

.kpi {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:14px;
}

.kpi h4 {
  margin:0;
  font-size:12px;
  color:#9ca3af;
}

.kpi h2 {
  margin:6px 0 0 0;
  font-size:22px;
}

/* PIPELINE */
.pipeline {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.stage {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:12px;
  font-size:13px;
}

.stage h3 {
  margin:0;
  font-size:12px;
  color:#9ca3af;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap:16px;
}

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:18px;
}

h3 {
  margin:0 0 10px 0;
  font-size:14px;
  color:#9ca3af;
}

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #1f2937;
  background:#050914;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* OUTPUT */
.output {
  margin-top:12px;
  padding:12px;
  background:#050914;
  border:1px solid #1f2937;
  border-radius:10px;
  font-size:13px;
  white-space:pre-wrap;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">NextWave Revenue OS</div>
  <div class="status">LIVE SYSTEM</div>
</div>

<div class="container">

<!-- KPI ROW -->
<div class="kpis">
  <div class="kpi">
    <h4>Funnels</h4>
    <h2 id="funnels">0</h2>
  </div>

  <div class="kpi">
    <h4>Leads</h4>
    <h2 id="leads">0</h2>
  </div>

  <div class="kpi">
    <h4>Traffic Events</h4>
    <h2 id="traffic">0</h2>
  </div>

  <div class="kpi">
    <h4>Revenue Signal</h4>
    <h2 style="color:#22c55e;" id="revenue">$0</h2>
  </div>
</div>

<!-- PIPELINE -->
<div class="pipeline">
  <div class="stage"><h3>Cold Traffic</h3><div id="cold">--</div></div>
  <div class="stage"><h3>Leads</h3><div id="leadStage">--</div></div>
  <div class="stage"><h3>Engaged</h3><div id="engaged">--</div></div>
  <div class="stage"><h3>Buyers</h3><div id="buyers">--</div></div>
</div>

<!-- MAIN GRID -->
<div class="grid">

<!-- FUNNEL -->
<div class="card">
<h3>Revenue Funnel Builder</h3>

<input id="funnelName" placeholder="Funnel Name">
<input id="affiliateLink" placeholder="Affiliate Offer Link">

<button onclick="createFunnel()">Create Revenue Funnel</button>

<div id="funnelOut" class="output"></div>
</div>

<!-- AI -->
<div class="card">
<h3>AI Revenue Engine</h3>

<button onclick="generateAI()">Generate Conversion Copy</button>

<div id="aiOut" class="output"></div>
</div>

<!-- TRAFFIC -->
<div class="card" style="grid-column: span 2;">
<h3>Traffic → Revenue Engine</h3>

<button onclick="generateTraffic()">Generate Revenue Traffic Plan</button>

<div id="trafficOut" class="output"></div>
</div>

</div>
</div>

<script>

let funnels = 0;
let leads = 124;
let traffic = 0;
let revenue = 0;

/* FUNNEL */
async function createFunnel(){
  const res = await fetch("/.netlify/functions/createPage", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("funnelName").value,
      link: document.getElementById("affiliateLink").value
    })
  });

  const data = await res.json();

  funnels++;
  leads += 5;
  traffic += 3;
  revenue += Math.floor(Math.random()*20);

  updateKPIs();

  document.getElementById("funnelOut").innerHTML =
  "✓ Funnel deployed into revenue system\n\n" + JSON.stringify(data, null, 2);
}

/* AI */
async function generateAI(){
  const res = await fetch("/.netlify/functions/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ niche:"affiliate marketing" })
  });

  const data = await res.json();

  document.getElementById("aiOut").innerHTML = `
CONVERSION HEADLINE:
${data.headline || "-"}

PSYCHOLOGICAL HOOK:
${data.hook || "-"}

REVENUE CTA:
${data.cta || "-"}
`;
}

/* TRAFFIC */
async function generateTraffic(){
  const res = await fetch("/.netlify/functions/traffic");
  const data = await res.json();

  traffic += data.length;
  leads += data.length * 2;
  revenue += data.length * 3;

  updateKPIs();

  document.getElementById("trafficOut").innerHTML =
  "REVENUE TRAFFIC PLAN:\n\n" + data.map(x => "→ " + x).join("\n");
}

/* UPDATE OS */
function updateKPIs(){
  document.getElementById("funnels").innerText = funnels;
  document.getElementById("leads").innerText = leads;
  document.getElementById("traffic").innerText = traffic;
  document.getElementById("revenue").innerText = "$" + revenue;
}

updateKPIs();

</script>

</body>
</html>
