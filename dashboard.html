<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revenue OS</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#070b16;
  color:white;
}

.header {
  padding:16px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #1f2937;
}

.container {
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:#0f172a;
  padding:16px;
  border-radius:12px;
  border:1px solid #1f2937;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#020617;
  border:1px solid #334155;
  color:white;
  border-radius:8px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

.kpis {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.kpi {
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.kpi h3 {
  margin:0;
  font-size:12px;
  color:#94a3b8;
}

.kpi h2 {
  margin:5px 0 0 0;
  font-size:18px;
}

.feed {
  margin-top:15px;
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  border:1px solid #1f2937;
  font-size:13px;
  color:#cbd5e1;
  height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="header">
  <div><b>Revenue OS</b></div>
  <div id="status">SYSTEM ACTIVE</div>
</div>

<div class="container">

<!-- KPIs -->
<div class="kpis">
  <div class="kpi">
    <h3>Revenue Est.</h3>
    <h2 id="rev">$0</h2>
  </div>

  <div class="kpi">
    <h3>Active Funnels</h3>
    <h2 id="funnels">0</h2>
  </div>

  <div class="kpi">
    <h3>Leads</h3>
    <h2 id="leads">0</h2>
  </div>

  <div class="kpi">
    <h3>System Score</h3>
    <h2 id="score">0</h2>
  </div>
</div>

<div class="grid">

<!-- FUNNEL BUILDER -->
<div class="card">
<h3>Create Funnel</h3>

<input id="name" placeholder="Funnel name">
<input id="link" placeholder="Affiliate link">

<button onclick="createFunnel()">Deploy Funnel</button>

<div class="feed" id="log">
> System ready...
</div>
</div>

<!-- AI -->
<div class="card">
<h3>AI System Output</h3>

<button onclick="ai()">Generate Copy</button>

<pre id="aiout"></pre>
</div>

</div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

/* LOG FEED */
function log(msg){
  document.getElementById("log").innerHTML += "<br>> " + msg;
}

/* LOAD SYSTEM */
async function load(){

  const { data: funnels } = await supabase.from("funnels").select("*");
  const { data: leads } = await supabase.from("leads").select("*");
  const { data: conversions } = await supabase.from("conversions").select("*");

  let funnelCount = funnels?.length || 0;
  let leadCount = leads?.length || 0;

  let totalRevenue = (conversions || []).reduce((sum, c) => {
    return sum + (c.revenue || 0);
  }, 0);

  let avgRevenuePerLead = leadCount > 0 ? totalRevenue / leadCount : 0;

  let score = totalRevenue * 2 + leadCount * 0.5;

  document.getElementById("funnels").innerText = funnelCount;
  document.getElementById("leads").innerText = leadCount;
  document.getElementById("rev").innerText = "$" + totalRevenue.toFixed(2);
  document.getElementById("score").innerText = Math.round(score);
}

/* CREATE FUNNEL */
window.createFunnel = async function(){

  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  await supabase.from("funnels").insert([
    { name, affiliate_link: link }
  ]);

  await supabase.from("events").insert([
    { type:"click", funnel_name:name }
  ]);

  log("Funnel deployed: " + name);
  load();
};

/* AI */
window.ai = function(){
  document.getElementById("aiout").innerText =
`HEADLINE: Turn Traffic Into Predictable Revenue
HOOK: Stop guessing — start using a system that compounds
CTA: Activate Revenue Engine`;
};

/* LIVE LOOP */
setInterval(load, 5000);
load();

</script>

</body>
</html>
